<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞机大战</title>
  <link rel="stylesheet" href="/games/shooter/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">✈</span>
        <div>
          <p class="eyebrow">Sky Shooter</p>
          <h1>飞机大战</h1>
          <p class="muted">闪避敌机、发射子弹、不断刷新最高分。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="main-column">
        <section class="hero card">
          <p class="eyebrow">街机射击</p>
          <h2>控制战机左右移动，击毁敌机，尽量存活更久。</h2>
          <p class="muted">使用方向键或 A / D 移动，空格键发射，P 键暂停。</p>
        </section>

        <section class="board-card card">
          <div class="board-head">
            <div>
              <h3>战斗区域</h3>
              <p class="muted">消灭更多敌机，注意不要与敌机相撞。</p>
            </div>
            <div id="status-chip" class="status-chip">准备起飞</div>
          </div>
          <div class="board-frame">
            <canvas id="board" width="420" height="640" aria-label="飞机大战画布"></canvas>
          </div>
        </section>
      </section>

      <aside class="sidebar">
        <section class="card panel">
          <h3>局内数据</h3>
          <div class="stats">
            <div class="stat"><span class="label">得分</span><strong id="score" class="value">0</strong></div>
            <div class="stat"><span class="label">生命</span><strong id="lives" class="value">3</strong></div>
            <div class="stat"><span class="label">击毁数</span><strong id="kills" class="value">0</strong></div>
            <div class="stat"><span class="label">最佳</span><strong id="best" class="value">0</strong></div>
          </div>
        </section>

        <section class="card actions">
          <button id="btn-start" class="btn primary" type="button">开始 / 重开</button>
          <button id="btn-pause" class="btn" type="button">暂停 / 继续</button>
          <div id="status-text" class="status-text">点击开始按钮或按空格起飞。</div>
        </section>

        <section class="card rules">
          <h3>操作说明</h3>
          <ul>
            <li>左 / 右方向键 或 A / D：移动</li>
            <li>空格：发射子弹</li>
            <li>P：暂停 / 继续</li>
            <li>敌机撞到战机会损失生命</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/games/shooter/app.js"></script>
</body>
</html>
