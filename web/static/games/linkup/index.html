<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>连连看 · Puzzle Link</title>
  <link rel="stylesheet" href="/games/linkup/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">L</span>
        <div>
          <p class="eyebrow">Puzzle Link</p>
          <h1>连连看</h1>
          <p class="muted">轻量休闲，支持洗牌与即时重开。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="main-column">
        <section class="hero-copy">
          <p class="eyebrow">休闲小游戏</p>
          <h2>找出相同图案，并在两次转弯内连通消除。</h2>
          <p class="muted">
            这是一版独立的前端连连看。你可以直接在浏览器里开始游玩，支持重新开始、洗牌、计时与步数统计。
          </p>
        </section>

        <section class="board-card">
          <div class="board-head">
            <div>
              <h3>游戏棋盘</h3>
              <p class="muted">点击两个相同图块，如果路径拐点不超过两次即可消除。</p>
            </div>
            <div id="status-chip" class="status-chip">请选择第一个图块</div>
          </div>
          <div id="board" class="linkup-grid" aria-label="连连看棋盘"></div>
        </section>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <h3>本局状态</h3>
          <div class="stats">
            <div class="stat">
              <span class="label">剩余配对</span>
              <span id="pairs-left" class="value">0</span>
            </div>
            <div class="stat">
              <span class="label">已完成配对</span>
              <span id="pairs-found" class="value">0</span>
            </div>
            <div class="stat">
              <span class="label">操作步数</span>
              <span id="moves" class="value">0</span>
            </div>
            <div class="stat">
              <span class="label">耗时</span>
              <span id="timer" class="value">00:00</span>
            </div>
          </div>
        </section>

        <section class="actions">
          <button id="btn-restart" class="btn primary" type="button">重新开始</button>
          <button id="btn-shuffle" class="btn" type="button">重新洗牌</button>
        </section>

        <section class="rules">
          <h3>玩法说明</h3>
          <ul>
            <li>点击两个相同图块尝试连线。</li>
            <li>路径可经过外边框，但拐点不能超过两次。</li>
            <li>洗牌不会重置计时和步数。</li>
            <li>全部图块消除后即可通关。</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/games/linkup/app.js"></script>
</body>
</html>
