<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猜单词</title>
  <link rel="stylesheet" href="/games/word-guess/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">🔤</span>
        <div>
          <p class="eyebrow">Word Guess</p>
          <h1>猜单词</h1>
          <p class="muted">六次机会内猜中隐藏单词。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="main-column">
        <section class="hero card">
          <p class="eyebrow">猜词挑战</p>
          <h2>逐步推断字母位置，尽快找出正确答案。</h2>
          <p class="muted">绿色表示字母正确且位置正确，黄色表示字母存在但位置错误，灰色表示不存在。</p>
        </section>

        <section class="board-card card">
          <div class="board-head">
            <div>
              <h3>猜词面板</h3>
              <p class="muted">输入 5 个字母后提交，系统会给出颜色反馈。</p>
            </div>
            <div id="status-chip" class="status-chip">开始猜词</div>
          </div>
          <div id="board" class="board" aria-label="猜单词棋盘"></div>
          <form id="guess-form" class="guess-form">
            <input id="guess-input" class="guess-input" maxlength="5" autocomplete="off" placeholder="输入五个字母" />
            <button class="btn primary" type="submit">提交猜测</button>
          </form>
        </section>
      </section>

      <aside class="sidebar">
        <section class="card panel">
          <h3>本局状态</h3>
          <div class="stats">
            <div class="stat"><span class="label">剩余次数</span><strong class="value" id="tries-left">6</strong></div>
            <div class="stat"><span class="label">已猜次数</span><strong class="value" id="guess-count">0</strong></div>
            <div class="stat"><span class="label">目标长度</span><strong class="value">5</strong></div>
          </div>
        </section>

        <section class="card actions">
          <button id="btn-new" class="btn primary" type="button">重新开始</button>
        </section>

        <section class="card rules">
          <h3>玩法说明</h3>
          <ul>
            <li>输入 5 个英文字母组成单词。</li>
            <li>绿色：字母和位置都正确。</li>
            <li>黄色：字母存在但位置不对。</li>
            <li>灰色：该字母不在答案中。</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/games/word-guess/app.js"></script>
</body>
</html>
