<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打砖块 · Breakout</title>
  <link rel="stylesheet" href="/games/breakout/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">🧱</span>
        <div>
          <p class="eyebrow">Breakout</p>
          <h1>打砖块</h1>
          <p class="muted">控制挡板反弹小球，击碎所有砖块。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="main-column">
        <section class="hero card">
          <p class="eyebrow">街机反弹</p>
          <h2>接住小球，清空砖块，进入下一关。</h2>
          <p class="muted">支持键盘方向键与鼠标移动挡板，砖块被击碎后会累计分数。</p>
        </section>

        <section class="board-card card">
          <div class="board-head">
            <div>
              <h3>游戏画布</h3>
              <p class="muted">左右移动挡板，千万别让小球落到底部。</p>
            </div>
            <div id="status-chip" class="status-chip">准备开始</div>
          </div>
          <div class="board-frame">
            <canvas id="board" width="720" height="480" aria-label="打砖块画布"></canvas>
          </div>
        </section>
      </section>

      <aside class="sidebar">
        <section class="card panel">
          <h3>本局状态</h3>
          <div class="stats">
            <div class="stat"><span class="label">分数</span><strong class="value" id="score">0</strong></div>
            <div class="stat"><span class="label">生命</span><strong class="value" id="lives">3</strong></div>
            <div class="stat"><span class="label">关卡</span><strong class="value" id="level">1</strong></div>
            <div class="stat"><span class="label">剩余砖块</span><strong class="value" id="bricks-left">0</strong></div>
          </div>
        </section>

        <section class="card actions">
          <button id="btn-start" class="btn primary" type="button">开始 / 重开</button>
          <button id="btn-pause" class="btn" type="button">暂停 / 继续</button>
          <div id="status-text" class="status-text">点击开始按钮进入游戏</div>
        </section>

        <section class="card rules">
          <h3>玩法说明</h3>
          <ul>
            <li>方向键左右移动挡板。</li>
            <li>鼠标横向移动也可控制挡板。</li>
            <li>击碎所有砖块进入下一关。</li>
            <li>球掉出底部会损失生命。</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/games/breakout/app.js"></script>
</body>
</html>
