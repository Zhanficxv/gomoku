<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>华容道</title>
  <link rel="stylesheet" href="/games/klotski/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">曹</span>
        <div>
          <p class="eyebrow">Klotski</p>
          <h1>华容道</h1>
          <p class="muted">滑动方块，为曹操开出通往出口的道路。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="main-column">
        <section class="hero card">
          <p class="eyebrow">经典解谜</p>
          <h2>通过移动棋子，让曹操从底部中央出口脱困。</h2>
          <p class="muted">点击一个棋子，再点击相邻可移动空位方向完成移动。</p>
        </section>

        <section class="board-card card">
          <div class="board-head">
            <div>
              <h3>棋盘</h3>
              <p class="muted">4 列 5 行布局，出口位于最底部中间两格。</p>
            </div>
            <div id="status-text" class="status-text">请选择要移动的棋子</div>
          </div>
          <div id="board" class="board" aria-label="华容道棋盘"></div>
        </section>
      </section>

      <aside class="sidebar">
        <section class="card panel">
          <h3>局内信息</h3>
          <div class="stats">
            <div class="stat"><span class="label">步数</span><strong id="move-count" class="value">0</strong></div>
            <div class="stat"><span class="label">当前选中</span><strong id="selected-piece" class="value">无</strong></div>
          </div>
        </section>

        <section class="card actions">
          <button id="btn-reset" class="btn primary" type="button">恢复初始局面</button>
        </section>

        <section class="card rules">
          <h3>玩法说明</h3>
          <ul>
            <li>曹操为 2x2 大方块。</li>
            <li>关羽、张飞、赵云、马超为竖条。</li>
            <li>兵卒为 1x1。</li>
            <li>将曹操移到最底部中央即获胜。</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/games/klotski/app.js"></script>
</body>
</html>
