<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黑白棋 · Reversi</title>
  <link rel="stylesheet" href="/games/reversi/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">◐</span>
        <div>
          <p class="eyebrow">Reversi</p>
          <h1>黑白棋</h1>
          <p class="muted">翻转对手棋子，占领更多格子赢得对局。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="board-card card">
        <div class="section-head">
          <div>
            <h2>8x8 棋盘</h2>
            <p class="muted">点击合法位置落子，自动翻转夹住的对手棋子。</p>
          </div>
          <div id="status-chip" class="status-chip">黑方先行</div>
        </div>
        <div id="board" class="board" aria-label="黑白棋棋盘"></div>
      </section>

      <aside class="panel">
        <section class="card side-card">
          <h3>局内信息</h3>
          <div class="stats">
            <div class="stat"><span>当前回合</span><strong id="turn-text">黑方</strong></div>
            <div class="stat"><span>黑棋</span><strong id="black-count">2</strong></div>
            <div class="stat"><span>白棋</span><strong id="white-count">2</strong></div>
            <div class="stat"><span>合法步</span><strong id="move-count">4</strong></div>
          </div>
        </section>

        <section class="card action-card">
          <button id="btn-restart" class="btn primary" type="button">重新开始</button>
          <button id="btn-pass" class="btn" type="button">跳过本回合</button>
        </section>

        <section class="card help-card">
          <h3>玩法说明</h3>
          <ul>
            <li>落子后会翻转被夹住的对手棋子。</li>
            <li>无合法步时可跳过回合。</li>
            <li>棋盘下满或双方都无路可走时结束。</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/games/reversi/app.js"></script>
</body>
</html>
