<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推箱子</title>
  <link rel="stylesheet" href="/games/sokoban/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">📦</span>
        <div>
          <p class="eyebrow">Sokoban</p>
          <h1>推箱子</h1>
          <p class="muted">把所有箱子推到目标点上，注意死角与路线。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="main-column">
        <section class="hero card">
          <p class="eyebrow">关卡解谜</p>
          <h2>一步一步规划路线，把全部箱子推到指定位置。</h2>
          <p class="muted">使用方向键或 WASD 移动人物。人物只能推动箱子，不能拉箱子。</p>
        </section>

        <section class="board-card card">
          <div class="board-head">
            <div>
              <h3>当前地图</h3>
              <p class="muted">全部箱子归位后即通关。</p>
            </div>
            <div id="status-chip" class="status-chip">准备开始</div>
          </div>
          <div id="board" class="board" aria-label="推箱子棋盘"></div>
        </section>
      </section>

      <aside class="sidebar">
        <section class="card panel">
          <h3>局内信息</h3>
          <div class="stats">
            <div class="stat"><span class="label">步数</span><strong class="value" id="move-count">0</strong></div>
            <div class="stat"><span class="label">箱子总数</span><strong class="value" id="box-count">0</strong></div>
            <div class="stat"><span class="label">已归位</span><strong class="value" id="placed-count">0</strong></div>
          </div>
        </section>

        <section class="card actions">
          <button id="btn-restart" class="btn primary" type="button">重置关卡</button>
        </section>

        <section class="card rules">
          <h3>玩法说明</h3>
          <ul>
            <li>方向键 / WASD 控制人物移动。</li>
            <li>只能推动箱子，不能拉动箱子。</li>
            <li>箱子进入死角后可能无法完成关卡。</li>
            <li>把所有箱子推到目标点后通关。</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/games/sokoban/app.js"></script>
</body>
</html>
