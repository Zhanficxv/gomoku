<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="/games/snake/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/">← 返回游戏大厅</a>
      <div class="brand">
        <span class="brand-mark">🐍</span>
        <div>
          <p class="eyebrow">Snake</p>
          <h1>贪吃蛇</h1>
          <p class="muted">控制方向、吃掉食物、避开自己与边界。</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="main-column">
        <section class="hero card">
          <p class="eyebrow">经典街机</p>
          <h2>吃得越多，速度越快，分数越高。</h2>
          <p class="muted">使用方向键或 WASD 控制移动，空格键暂停 / 继续，适合键盘即时游玩。</p>
        </section>

        <section class="board-card card">
          <div class="board-head">
            <div>
              <h3>游戏画布</h3>
              <p class="muted">小心不要撞墙，也不要撞到自己。</p>
            </div>
            <div id="status-chip" class="status-chip">按开始按钮或方向键开始</div>
          </div>
          <div class="board-frame">
            <canvas id="board" width="560" height="560" aria-label="贪吃蛇画布"></canvas>
          </div>
        </section>
      </section>

      <aside class="sidebar">
        <section class="card panel">
          <h3>本局状态</h3>
          <div class="stats">
            <div class="stat"><span class="label">得分</span><strong class="value" id="score">0</strong></div>
            <div class="stat"><span class="label">长度</span><strong class="value" id="length">3</strong></div>
            <div class="stat"><span class="label">速度</span><strong class="value" id="speed">1x</strong></div>
            <div class="stat"><span class="label">最佳</span><strong class="value" id="best">0</strong></div>
          </div>
        </section>

        <section class="card actions">
          <button id="btn-start" class="btn primary" type="button">开始 / 重新开始</button>
          <button id="btn-pause" class="btn" type="button">暂停 / 继续</button>
          <div id="status-text" class="status-text">按开始按钮或方向键开始</div>
        </section>

        <section class="card help-card">
          <h3>操作说明</h3>
          <ul>
            <li>方向键 / WASD 控制方向</li>
            <li>空格键暂停 / 继续</li>
            <li>吃到食物后得分并增长</li>
            <li>撞墙或撞到自己会结束</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/games/snake/app.js"></script>
</body>
</html>
