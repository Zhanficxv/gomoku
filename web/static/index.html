<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋 · Gomoku</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>五子棋</h1>
      <p class="subtitle">Go + Vanilla JS · 黑白对弈，五子连珠者胜</p>
    </header>

    <main class="main">
      <section class="board-wrapper">
        <canvas id="board" width="600" height="600" aria-label="五子棋棋盘"></canvas>
      </section>

      <aside class="panel">
        <div class="status-card">
          <div class="row">
            <span class="label">游戏 ID</span>
            <span id="game-id" class="value mono">—</span>
          </div>
          <div class="row">
            <span class="label">当前回合</span>
            <span id="turn" class="value">
              <span class="stone stone-black"></span>
              <span id="turn-text">黑棋</span>
            </span>
          </div>
          <div class="row">
            <span class="label">手数</span>
            <span id="move-count" class="value mono">0</span>
          </div>
          <div id="status-banner" class="status-banner playing">对局进行中</div>
        </div>

        <div class="actions">
          <button id="btn-new" class="btn primary">新对局</button>
          <button id="btn-undo" class="btn">悔棋</button>
          <button id="btn-reset" class="btn">重置棋盘</button>
        </div>

        <div class="history-card">
          <h3>落子记录</h3>
          <ol id="history-list" class="history-list"></ol>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <span>提示：黑棋先行，点击棋盘交叉点落子。</span>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
