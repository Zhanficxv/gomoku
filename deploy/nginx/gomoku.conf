# =============================================================================
#  Gomoku · Nginx 反向代理配置
# -----------------------------------------------------------------------------
#  使用方式：
#    1. 复制本文件到 /etc/nginx/conf.d/gomoku.conf
#       或 /etc/nginx/sites-available/gomoku.conf 并软链到 sites-enabled/
#    2. 把 server_name、SSL 证书路径、upstream 地址改成你自己的
#    3. nginx -t  &&  systemctl reload nginx
#
#  本配置默认假定：
#    - Go 服务监听本机 127.0.0.1:8080（即 ./gomoku -addr 127.0.0.1:8080）
#    - Nginx 同时承担 HTTP→HTTPS 跳转、TLS 终止、WebSocket 反向代理
#      以及静态资源的 gzip / 缓存。
# =============================================================================


# ---- WebSocket 升级所需的 Connection / Upgrade 头映射 ----------------------
# 放在 http {} 块下；如果你的发行版默认已经有同名 map，可以删除此段。
map $http_upgrade $gomoku_connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- 上游：Go 二进制本机进程；如果跨机部署改成具体 IP/端口 ------------------
upstream gomoku_backend {
    # least_conn 让多实例时连接更平均；单实例无差别
    least_conn;
    server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}


# ---- HTTP（80）：将所有流量重定向到 HTTPS ----------------------------------
# 如果你暂时只用纯 HTTP，可以删除本块，并把下面 HTTPS 块里的 listen 改为 80。
server {
    listen 80;
    listen [::]:80;
    server_name gomoku.example.com;

    # ACME http-01 验证（Certbot / Lego 等都默认走这里）
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ---- HTTPS（443）：主入口 --------------------------------------------------
server {
    # nginx 1.25+ 推荐：`listen 443 ssl;` + `http2 on;`
    # 老版本（< 1.25）请改成：`listen 443 ssl http2;`
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gomoku.example.com;

    # ----- TLS 证书 -----
    ssl_certificate     /etc/letsencrypt/live/gomoku.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gomoku.example.com/privkey.pem;

    # 推荐的 TLS 参数（来自 Mozilla intermediate）
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- 安全相关响应头 -----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ----- 基础限制 -----
    client_max_body_size 1m;          # API 体积都很小
    client_body_timeout  20s;
    keepalive_timeout    65s;

    # ----- 压缩 -----
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/json application/javascript application/xml
        application/xml+rss image/svg+xml;

    # ===== 路由 =====

    # WebSocket：/ws/rooms/{id}
    # 必须显式开启 HTTP/1.1 + Upgrade，并把读写超时拉长以保留长连接。
    location /ws/ {
        proxy_pass http://gomoku_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $gomoku_connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接的关键：禁用缓冲、放大超时
        proxy_buffering          off;
        proxy_request_buffering  off;
        proxy_read_timeout       1h;
        proxy_send_timeout       1h;
    }

    # REST API：/api/*
    # 这些请求都很短，开启 keepalive 即可
    location /api/ {
        proxy_pass http://gomoku_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # 健康检查（不写访问日志，避免噪音）
    location = /healthz {
        access_log off;
        proxy_pass http://gomoku_backend;
        proxy_set_header Host $host;
    }

    # 静态资源：app.js / styles.css 等
    # 二进制本身已 embed 了它们，nginx 直接走代理即可；
    # 这里给 hashable 资源加上较长的浏览器缓存
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        proxy_pass http://gomoku_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # 其它一切（HTML、根路径等）
    location / {
        proxy_pass http://gomoku_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}
