# =============================================================================
#  Gomoku · Nginx 反向代理（纯 HTTP，无 TLS）
# -----------------------------------------------------------------------------
#  适用场景：
#    - 局域网 / 内网部署，不需要 HTTPS
#    - 已经有上游负载均衡或 ingress 负责 TLS 终止
#    - 容器 / 开发环境快速试验
#
#  使用方式：
#    cp gomoku-http.conf /etc/nginx/conf.d/gomoku.conf
#    nginx -t && systemctl reload nginx
# =============================================================================

map $http_upgrade $gomoku_connection_upgrade {
    default upgrade;
    ''      close;
}

upstream gomoku_backend {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 1m;
    keepalive_timeout    65s;

    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/json application/javascript application/xml
        application/xml+rss image/svg+xml;

    # WebSocket 长连接
    location /ws/ {
        proxy_pass http://gomoku_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $gomoku_connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      1h;
        proxy_send_timeout      1h;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://gomoku_backend;
        proxy_set_header Host $host;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        proxy_pass http://gomoku_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    location / {
        proxy_pass http://gomoku_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}
